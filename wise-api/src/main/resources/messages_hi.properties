RESET_PASSWORD.EMAIL_BODY=<p>किसी ने, संभवतः आपने, आपके WiseMapping खाते के लिए पासवर्ड रीसेट का अनुरोध किया।</p><p>नया पासवर्ड सेट करने के लिए नीचे दिए गए लिंक पर क्लिक करें। <strong>यह लिंक 1 घंटे में समाप्त हो जाएगी।</strong></p><p><a href="{0}">मेरा पासवर्ड रीसेट करें</a></p><p>यदि आपने यह अनुरोध नहीं किया है, तो आप इस ईमेल को सुरक्षित रूप से अनदेखा कर सकते हैं। आपका वर्तमान पासवर्ड अपरिवर्तित रहेगा।</p>
