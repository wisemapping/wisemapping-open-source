# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Compile & Run Tests

on:
  push:
    branches: [ "develop","main" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag for app publishing'
        required: false
        default: 'latest'
        type: string
      frontend_branch:
        description: 'Frontend branch to use'
        required: false
        default: 'main'
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'zulu'
          cache: 'maven'

      - name: Build with Maven (skip tests on main)
        run: |
          BUILD_NUMBER="${{ github.event.inputs.tag || 'dev' }}"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Building on main branch - skipping tests"
            mvn -B clean install -DskipTests -Dbuild.number=${BUILD_NUMBER} --file wise-api/pom.xml
          else
            echo "Building on ${{ github.ref }} - running tests"
            mvn -B clean install -Dbuild.number=${BUILD_NUMBER} --file wise-api/pom.xml
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifact
          path: wise-api/target/*.jar

  docker-publish-dev:
    if: github.ref == 'refs/heads/develop'
    needs: build
    uses: ./.github/workflows/docker-api-publish.yml
    with:
      tag: latest
    secrets: inherit
    
  docker-publish-prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/docker-api-publish.yml
    with:
      tag: stable
    secrets: inherit

  docker-app-publish:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    uses: ./.github/workflows/docker-app-publish.yml
    with:
      tag: ${{ github.event.inputs.tag || 'latest' }}
      frontend_branch: ${{ github.event.inputs.frontend_branch || 'main' }}
    secrets: inherit

  tag-release:
    if: github.event_name == 'workflow_dispatch'
    needs: docker-app-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Tag API repository with release version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.tag }}
          git push origin ${{ github.event.inputs.tag }}

      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          repository: wisemapping/wisemapping-frontend
          ref: ${{ github.event.inputs.frontend_branch || 'main' }}
          token: ${{ secrets.WISEMAPPING_FRONTEND_TOKEN }}
          path: wisemapping-frontend

      - name: Tag frontend repository with release version
        working-directory: wisemapping-frontend
        env:
          FRONTEND_TOKEN: ${{ secrets.WISEMAPPING_FRONTEND_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${FRONTEND_TOKEN}@github.com/wisemapping/wisemapping-frontend.git
          git tag ${{ github.event.inputs.tag }}
          git push origin ${{ github.event.inputs.tag }}

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    #- name: Update dependency graph
   #   uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
