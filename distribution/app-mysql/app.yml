spring:
  datasource:
    url: jdbc:mysql://mysql:3306/wisemapping?useUnicode=true&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true&useSSL=false
    username: wisemapping
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      platform: mysql
      mode: always
      schema-locations: classpath:schema-mysql.sql
      data-locations: classpath:data-mysql.sql
      continue-on-error: false
