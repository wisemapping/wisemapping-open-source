# =============================================================================
# WiseMapping with MariaDB - Docker Compose Configuration
# =============================================================================
#
# BEFORE STARTING:
# 1. Set WISEMAPPING_DATA_DIR environment variable (REQUIRED)
# 2. Set MARIADB_ROOT_PASSWORD environment variable (REQUIRED)
# 3. Create the data directory: mkdir -p ${WISEMAPPING_DATA_DIR}/logs
#
# QUICK START:
#   docker-compose up -d
#
# ACCESS:
#   Application: http://localhost (or http://localhost:${WISEMAPPING_PORT})
#   Default login: test@wisemapping.org / password
#   Admin login:   admin@wisemapping.org / testAdmin123
#
# LOGS:
#   Location: ${WISEMAPPING_DATA_DIR}/logs/
#
# =============================================================================

services:
  mariadb:
    image: mariadb:11.4
    container_name: wisemapping-mariadb
    command: --lower_case_table_names=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-wisemapping}
      MARIADB_USER: ${MARIADB_USER:-wisemapping}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-password}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
    volumes:
      - ${WISEMAPPING_DATA_DIR:?WISEMAPPING_DATA_DIR is required - please set the storage path}/db:/var/lib/mysql
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10
    networks:
      - wisemapping-network

  wisemapping:
    image: wisemapping/wisemapping:latest
    container_name: wisemapping-app
    ports:
      - "${WISEMAPPING_PORT:-80}:80"
    volumes:
      - ./app.yml:/app/config/application.yml:ro
      - ${WISEMAPPING_DATA_DIR:?WISEMAPPING_DATA_DIR is required - please set the storage path}/logs:/var/log/wisemapping:rw
    environment:
      - JAVA_OPTS=${JAVA_OPTS:--Xmx2048m -Xms1024m}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - wisemapping-network
    restart: unless-stopped

networks:
  wisemapping-network:
    driver: bridge
